<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="crown-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b8d8e8" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#90b8cc" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="flint-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c8b8d0" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#a898b8" stop-opacity="0.22"/>
    </linearGradient>
    <radialGradient id="flare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="30%" stop-color="#fffbe0" stop-opacity="0.8"/>
      <stop offset="60%" stop-color="#ffeaa0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffeaa0" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <g transform="translate(0, 32)">
    <path d="M 10,-18 A 32,32 0 0 0 10,18 L 15,17 A 70,70 0 0 0 15,-17 Z"
          fill="url(#crown-glass)" stroke="#5a8aaa" stroke-width="1.1" stroke-linejoin="round"/>
    <path d="M 15,-17 A 70,70 0 0 1 15,17 L 25,16 A 28,28 0 0 1 25,-16 Z"
          fill="url(#flint-glass)" stroke="#7a6a90" stroke-width="0.9" stroke-linejoin="round"/>
    <path d="M 30,-14 A 26,26 0 0 0 30,14 L 31,14 A 26,26 0 0 0 31,-14 Z"
          fill="url(#crown-glass)" stroke="#5a8aaa" stroke-width="1.1" stroke-linejoin="round"/>
    <path d="M 37,-16 A 28,28 0 0 1 37,16 L 47,17 A 70,70 0 0 1 47,-17 Z"
          fill="url(#flint-glass)" stroke="#7a6a90" stroke-width="0.9" stroke-linejoin="round"/>
    <path d="M 47,-17 A 70,70 0 0 0 47,17 L 52,18 A 32,32 0 0 0 52,-18 Z"
          fill="url(#crown-glass)" stroke="#5a8aaa" stroke-width="1.1" stroke-linejoin="round"/>

    <!-- RGB rays — smooth beziers, extended past E1 -->
    <path d="M 3,-13 C 22,-9 40,-4 58,0" fill="none" stroke="#ff6b6b" stroke-width="0.9" opacity="0.85"/>
    <line x1="3" y1="0" x2="58" y2="0" stroke="#4ddb7f" stroke-width="0.9" opacity="0.85"/>
    <path d="M 3,13 C 22,9 40,4 58,0" fill="none" stroke="#5a9aff" stroke-width="0.9" opacity="0.85"/>

    <circle cx="58" cy="0" r="5" fill="url(#flare)" opacity="0.9"/>
    <circle cx="58" cy="0" r="1.5" fill="#ffffff" opacity="1"/>
  </g>
</svg>