<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 108" width="320" height="108">
  <!--
    OpticalBench mark — standalone Heliar diagram for print.
    No wordmark. Transparent background.
    Designed for light card stock at ~1.5–2" wide.
    At 300 DPI, 320px ≈ 1.07" — scale as needed via CSS or print layout.
    viewBox tightly crops the optical system + flare.
  -->
  <defs>
    <linearGradient id="crown-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0ddef" stop-opacity="0.38"/>
      <stop offset="50%" stop-color="#a8cce0" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#96bedb" stop-opacity="0.40"/>
    </linearGradient>
    <linearGradient id="flint-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0c0e0" stop-opacity="0.32"/>
      <stop offset="50%" stop-color="#c0b0d4" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#b0a0c8" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="flare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e87800" stop-opacity="0.95"/>
      <stop offset="20%" stop-color="#ff9500" stop-opacity="0.7"/>
      <stop offset="45%" stop-color="#ffb840" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ffd080" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coating-reflect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5090b8" stop-opacity="0.18"/>
      <stop offset="30%" stop-color="#5090b8" stop-opacity="0.03"/>
      <stop offset="70%" stop-color="#5090b8" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#5090b8" stop-opacity="0.16"/>
    </linearGradient>
  </defs>

  <!-- Coordinate system: optical axis at y=54 (vertical center of viewBox) -->
  <g transform="translate(8, 54)">

    <!-- ============================================ -->
    <!-- GROUP 1: FRONT CEMENTED DOUBLET              -->
    <!-- ============================================ -->

    <!-- E1: Biconvex crown -->
    <path d="M 29,-46 A 82,82 0 0 0 29,46 L 40,44 A 180,180 0 0 0 40,-44 Z"
          fill="url(#crown-glass)" stroke="#2a5a78" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M 29,-46 A 82,82 0 0 0 29,46" fill="none" stroke="url(#coating-reflect)" stroke-width="1.6"/>

    <!-- E2: Biconcave flint -->
    <path d="M 40,-44 A 180,180 0 0 1 40,44 L 67,42 A 70,70 0 0 1 67,-42 Z"
          fill="url(#flint-glass)" stroke="#4a3a62" stroke-width="1.1" stroke-linejoin="round"/>
    <!-- Cement boundary -->
    <path d="M 40,-44 A 180,180 0 0 1 40,44" fill="none" stroke="#5a7090" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.45"/>

    <!-- ============================================ -->
    <!-- GROUP 2: SINGLE MIDDLE ELEMENT               -->
    <!-- ============================================ -->

    <!-- E3: Biconvex -->
    <path d="M 110,-36 A 68,68 0 0 0 110,36 L 112,36 A 68,68 0 0 0 112,-36 Z"
          fill="url(#crown-glass)" stroke="#2a5a78" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M 110,-36 A 68,68 0 0 0 110,36" fill="none" stroke="url(#coating-reflect)" stroke-width="1.6"/>
    <path d="M 112,-36 A 68,68 0 0 0 112,36" fill="none" stroke="url(#coating-reflect)" stroke-width="1.4"/>

    <!-- ============================================ -->
    <!-- GROUP 3: REAR CEMENTED DOUBLET (mirror of G1)-->
    <!-- ============================================ -->

    <!-- E4: Biconcave flint -->
    <path d="M 155,-42 A 70,70 0 0 1 155,42 L 182,44 A 180,180 0 0 1 182,-44 Z"
          fill="url(#flint-glass)" stroke="#4a3a62" stroke-width="1.1" stroke-linejoin="round"/>
    <!-- Cement boundary -->
    <path d="M 182,-44 A 180,180 0 0 0 182,44" fill="none" stroke="#5a7090" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.45"/>

    <!-- E5: Biconvex crown -->
    <path d="M 182,-44 A 180,180 0 0 0 182,44 L 193,46 A 82,82 0 0 0 193,-46 Z"
          fill="url(#crown-glass)" stroke="#2a5a78" stroke-width="1.2" stroke-linejoin="round"/>
    <path d="M 193,-46 A 82,82 0 0 1 193,46" fill="none" stroke="url(#coating-reflect)" stroke-width="1.6"/>

    <!-- ============================================ -->
    <!-- APERTURE STOP                                -->
    <!-- ============================================ -->
    <line x1="86" y1="-48" x2="86" y2="-30" stroke="#3a5060" stroke-width="1" opacity="0.4"/>
    <line x1="86" y1="30" x2="86" y2="48" stroke="#3a5060" stroke-width="1" opacity="0.4"/>

    <!-- ============================================ -->
    <!-- OPTICAL AXIS                                 -->
    <!-- ============================================ -->
    <line x1="-7" y1="0" x2="300" y2="0" stroke="#a0aab4" stroke-width="0.4" stroke-dasharray="4,6" opacity="0.25"/>

    <!-- ============================================ -->
    <!-- RGB RAY TRACES                               -->
    <!-- Smooth cubic beziers, extended past E1 front  -->
    <!-- ============================================ -->

    <!-- Red ray (upper marginal) -->
    <path d="M -7,-32 C 60,-22 140,-10 290,0"
          fill="none" stroke="#c02020" stroke-width="1.1" opacity="0.8"/>

    <!-- Green ray (axial) -->
    <line x1="-7" y1="0" x2="290" y2="0"
          stroke="#1a8a40" stroke-width="1.1" opacity="0.8"/>

    <!-- Blue ray (lower marginal) -->
    <path d="M -7,32 C 60,22 140,10 290,0"
          fill="none" stroke="#2050b0" stroke-width="1.1" opacity="0.8"/>

    <!-- ============================================ -->
    <!-- FOCAL POINT FLARE                            -->
    <!-- ============================================ -->
    <circle cx="290" cy="0" r="14" fill="url(#flare)" opacity="0.85"/>
    <circle cx="290" cy="0" r="3" fill="#e07000" opacity="0.8"/>
    <circle cx="290" cy="0" r="1.2" fill="#ffffff" opacity="0.9"/>
    <!-- Restrained star spikes for print -->
    <line x1="280" y1="0" x2="300" y2="0" stroke="#e08a20" stroke-width="0.5" opacity="0.4"/>
    <line x1="290" y1="-10" x2="290" y2="10" stroke="#e08a20" stroke-width="0.5" opacity="0.4"/>
  </g>
</svg>