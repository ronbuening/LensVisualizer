<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="crown-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c0ddef" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#a8cce0" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#96bedb" stop-opacity="0.38"/>
    </linearGradient>
    <linearGradient id="flint-glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d0c0e0" stop-opacity="0.30"/>
      <stop offset="50%" stop-color="#c0b0d4" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#b0a0c8" stop-opacity="0.32"/>
    </linearGradient>
    <radialGradient id="flare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9500" stop-opacity="0.9"/>
      <stop offset="25%" stop-color="#ffb840" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ffd080" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffe0a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="flare-outer" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9500" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffcc60" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="coating-reflect" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5090b8" stop-opacity="0.20"/>
      <stop offset="30%" stop-color="#5090b8" stop-opacity="0.04"/>
      <stop offset="70%" stop-color="#5090b8" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#5090b8" stop-opacity="0.18"/>
    </linearGradient>
    <radialGradient id="bg-vignette" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0f0f0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-vignette)"/>

  <g transform="translate(240, 265) scale(1.8)">
    <!-- GROUP 1 -->
    <path d="M 29,-46 A 82,82 0 0 0 29,46 L 40,44 A 180,180 0 0 0 40,-44 Z"
          fill="url(#crown-glass)" stroke="#3a6a8a" stroke-width="1.1" stroke-linejoin="round"/>
    <path d="M 29,-46 A 82,82 0 0 0 29,46" fill="none" stroke="url(#coating-reflect)" stroke-width="1.8"/>
    <path d="M 40,-44 A 180,180 0 0 1 40,44 L 67,42 A 70,70 0 0 1 67,-42 Z"
          fill="url(#flint-glass)" stroke="#5a4a70" stroke-width="1" stroke-linejoin="round"/>
    <path d="M 40,-44 A 180,180 0 0 1 40,44" fill="none" stroke="#5a7090" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.5"/>

    <!-- GROUP 2 -->
    <path d="M 110,-36 A 68,68 0 0 0 110,36 L 112,36 A 68,68 0 0 0 112,-36 Z"
          fill="url(#crown-glass)" stroke="#3a6a8a" stroke-width="1.1" stroke-linejoin="round"/>
    <path d="M 110,-36 A 68,68 0 0 0 110,36" fill="none" stroke="url(#coating-reflect)" stroke-width="1.8"/>
    <path d="M 112,-36 A 68,68 0 0 0 112,36" fill="none" stroke="url(#coating-reflect)" stroke-width="1.5"/>

    <!-- GROUP 3 -->
    <path d="M 155,-42 A 70,70 0 0 1 155,42 L 182,44 A 180,180 0 0 1 182,-44 Z"
          fill="url(#flint-glass)" stroke="#5a4a70" stroke-width="1" stroke-linejoin="round"/>
    <path d="M 182,-44 A 180,180 0 0 0 182,44" fill="none" stroke="#5a7090" stroke-width="0.5" stroke-dasharray="2,3" opacity="0.5"/>
    <path d="M 182,-44 A 180,180 0 0 0 182,44 L 193,46 A 82,82 0 0 0 193,-46 Z"
          fill="url(#crown-glass)" stroke="#3a6a8a" stroke-width="1.1" stroke-linejoin="round"/>
    <path d="M 193,-46 A 82,82 0 0 1 193,46" fill="none" stroke="url(#coating-reflect)" stroke-width="1.8"/>

    <!-- Aperture stop -->
    <line x1="86" y1="-48" x2="86" y2="-30" stroke="#4a6070" stroke-width="1" opacity="0.45"/>
    <line x1="86" y1="30" x2="86" y2="48" stroke="#4a6070" stroke-width="1" opacity="0.45"/>

    <!-- Optical axis -->
    <line x1="-7" y1="0" x2="300" y2="0" stroke="#b8c4d0" stroke-width="0.4" stroke-dasharray="4,7" opacity="0.35"/>

    <!-- RGB rays — smooth beziers -->
    <path d="M -7,-32 C 60,-22 140,-10 290,0" fill="none" stroke="#d83838" stroke-width="0.9" opacity="0.85"/>
    <line x1="-7" y1="0" x2="290" y2="0" stroke="#22a850" stroke-width="0.9" opacity="0.85"/>
    <path d="M -7,32 C 60,22 140,10 290,0" fill="none" stroke="#3060d0" stroke-width="0.9" opacity="0.85"/>

    <!-- Focal flare -->
    <circle cx="290" cy="0" r="28" fill="url(#flare-outer)" opacity="0.7"/>
    <circle cx="290" cy="0" r="16" fill="url(#flare)" opacity="0.9"/>
    <circle cx="290" cy="0" r="3" fill="#ff9500" opacity="0.9"/>
    <circle cx="290" cy="0" r="1.5" fill="#ffffff" opacity="1"/>
    <line x1="274" y1="0" x2="306" y2="0" stroke="#ffb840" stroke-width="0.6" opacity="0.45"/>
    <line x1="290" y1="-16" x2="290" y2="16" stroke="#ffb840" stroke-width="0.6" opacity="0.45"/>
    <line x1="279" y1="-11" x2="301" y2="11" stroke="#ffb840" stroke-width="0.4" opacity="0.25"/>
    <line x1="279" y1="11" x2="301" y2="-11" stroke="#ffb840" stroke-width="0.4" opacity="0.25"/>
  </g>

  <text x="600" y="500" font-family="'Gill Sans', 'Optima', 'Avenir', sans-serif" font-size="52" font-weight="300" letter-spacing="4" fill="#1a2030" text-anchor="middle">
    Optical<tspan font-weight="600">Bench</tspan>
  </text>
  <text x="600" y="540" font-family="'Gill Sans', 'Optima', 'Avenir', sans-serif" font-size="20" font-weight="400" letter-spacing="8" fill="#4a5a6a" text-anchor="middle">
    .net
  </text>
  <text x="600" y="575" font-family="'Gill Sans', 'Optima', 'Avenir', sans-serif" font-size="14" font-weight="300" letter-spacing="3" fill="#7a8898" text-anchor="middle">
    Lens Patent Analysis &amp; Optical Decomposition
  </text>
</svg>